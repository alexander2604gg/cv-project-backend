# =============================================
# Application
# =============================================
spring.application.name=cv-project
spring.profiles.active=local
# Perfil activo:
# - local: configuración local
# - dev: configuración desplegada en AWS
# Se recomienda definirlo por variable de entorno: SPRING_PROFILES_ACTIVE
# spring.profiles.active=local
# =============================================
# DataSource
# =============================================
# Definido por perfil en:
# - application-local.properties
# - application-dev.properties
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================
# Connection Pool (HikariCP)
# =============================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# =============================================
# JWT (También como variables para mayor seguridad)
# =============================================
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION:3600000}
security.refresh-token.expiration-ms=${REFRESH_TOKEN_EXPIRATION:604800000}
