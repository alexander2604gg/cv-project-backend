# =============================================
# Application
# =============================================
spring.application.name=cv-project
spring.port=${SERVER_PORT}
# =============================================
# DataSource - PostgreSQL (Variables para AWS)
# =============================================
# Las variables entre ${} las llenaremos en la consola de Elastic Beanstalk
spring.datasource.url=jdbc:postgresql://${DB_ENDPOINT}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================
# Connection Pool (HikariCP)
# =============================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# =============================================
# JWT (También como variables para mayor seguridad)
# =============================================
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION:3600000}
security.refresh-token.expiration-ms=${REFRESH_TOKEN_EXPIRATION:604800000}